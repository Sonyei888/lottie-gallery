<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browser-based gallery for previewing Lottie JSON animations." />
  <title>Lottie Gallery</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js" defer></script>
</head>
<body>

  <header>
    <div class="brand">
      <span class="brand-label">Animation Viewer</span>
      <h1>Lottie Gallery</h1>
      <div class="stats" id="stats">No files loaded</div>
    </div>
  </header>

  <div id="dropzone">
    <input type="file" id="fileInput" multiple accept=".json" />
    <span class="drop-icon">🎬</span>
    <div class="drop-title">Drop your Lottie files here</div>
    <div class="drop-sub">or click to select &nbsp;·&nbsp; accepts multiple .json files</div>
  </div>

  <div id="toolbar">
    <div class="toolbar-left">
      <input type="text" id="search" placeholder="search by name..." />
      <button class="size-btn" data-size="sm">S</button>
      <button class="size-btn active" data-size="md">M</button>
      <button class="size-btn" data-size="lg">L</button>
    </div>
    <div class="toolbar-right">
      <button class="btn-add">
        <input type="file" id="addMoreInput" multiple accept=".json" />
        + Add more
      </button>
      <button class="btn-clear" id="clearBtn">&#x2715; Clear</button>
    </div>
  </div>

  <div id="gallery" class="size-md"></div>
  <div id="empty">No animations match the current search.</div>

  <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="modal-title"></span>
        <button class="modal-close" id="modalClose" aria-label="Close">&#x2715;</button>
      </div>
      <div id="modal-player"></div>
      <div class="modal-info" id="modal-info"></div>
      <div class="modal-exports">
        <span class="modal-exports-label">Export as</span>
        <div class="export-actions">
          <button class="export-btn" id="export-png" aria-label="Download PNG">PNG</button>
          <button class="export-btn export-btn--gif" id="export-gif" aria-label="Download GIF">GIF</button>
        </div>
        <div class="export-progress" id="export-progress">
          <div class="export-progress-track">
            <div class="export-progress-bar" id="export-progress-bar"></div>
          </div>
          <span class="export-progress-label" id="export-progress-label"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
